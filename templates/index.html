{% extends 'base.html' %}
{% block title %}Clients{% endblock %}
{% block content %}
<h1>Clients</h1>
<a href="{{ url_for('client_new') }}">+ New Client</a>
<ul>
    {% for client in clients %}
    <li><a href="{{ url_for('client_profile', client_id=client['id']) }}">{{ client['name'] }}</a></li>
    {% else %}
    <li>No clients yet.</li>
    {% endfor %}
</ul>
{% endblock %}
